services:

  postgres:
    image: postgres:16-alpine
    container_name: recon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recon
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon -d recon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - recon_net

  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: recon_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: ""
      # Pass postgres password so provisioning can read it
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - recon_net

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local

networks:
  recon_net:
    driver: bridge
